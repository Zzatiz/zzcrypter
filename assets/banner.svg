<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="10"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)" rx="2"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#7b2fff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="540" y1="0" x2="540" y2="200"/>
    <line x1="720" y1="0" x2="720" y2="200"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(52, 60)" filter="url(#glow)">
    <path d="M38 0 L76 14 L76 42 C76 62 60 76 38 84 C16 76 0 62 0 42 L0 14 Z"
          fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <path d="M38 10 L66 21 L66 42 C66 57 53 68 38 75 C23 68 10 57 10 42 L10 21 Z"
          fill="#7b2fff" opacity="0.15"/>
    <!-- Lock body -->
    <rect x="26" y="46" width="24" height="18" rx="3" fill="url(#accent)" opacity="0.85"/>
    <!-- Lock shackle -->
    <path d="M30 46 L30 39 Q38 31 46 39 L46 46" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="38" cy="54" r="3" fill="#0d0d0d"/>
    <rect x="36.5" y="54" width="3" height="5" fill="#0d0d0d"/>
  </g>

  <!-- Binary stream decoration (right side) -->
  <g opacity="0.12" font-family="monospace" font-size="11" fill="#00e5ff">
    <text x="780" y="35">01101100</text>
    <text x="790" y="55">10010111</text>
    <text x="775" y="75">11000101</text>
    <text x="785" y="95">00111010</text>
    <text x="770" y="115">10101100</text>
    <text x="780" y="135">01110011</text>
    <text x="790" y="155">11001010</text>
    <text x="775" y="175">00011101</text>
  </g>

  <!-- Title -->
  <text x="165" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="46"
        font-weight="700" fill="url(#accent)" filter="url(#glow)" letter-spacing="2">
    zzcrypter
  </text>

  <!-- Subtitle -->
  <text x="167" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="16"
        fill="#a0a0c0" letter-spacing="1">
    EXE Call Stack Crypter — AV Bypass via Windows Application
  </text>

  <!-- Tags -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#7b2fff">
    <rect x="167" y="148" width="60" height="22" rx="4" fill="#7b2fff" opacity="0.2" stroke="#7b2fff" stroke-width="0.8"/>
    <text x="179" y="163" fill="#c084fc">C#</text>

    <rect x="237" y="148" width="88" height="22" rx="4" fill="#7b2fff" opacity="0.2" stroke="#7b2fff" stroke-width="0.8"/>
    <text x="249" y="163" fill="#c084fc">WinForms</text>

    <rect x="335" y="148" width="108" height="22" rx="4" fill="#00e5ff" opacity="0.1" stroke="#00e5ff" stroke-width="0.8"/>
    <text x="347" y="163" fill="#67e8f9">Obfuscation</text>

    <rect x="453" y="148" width="80" height="22" rx="4" fill="#00e5ff" opacity="0.1" stroke="#00e5ff" stroke-width="0.8"/>
    <text x="463" y="163" fill="#67e8f9">Base64+ROT</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="197" width="900" height="3" fill="url(#accent)" rx="2"/>
</svg>
